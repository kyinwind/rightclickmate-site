name: Build Docs

on:
  push:
    paths:
      - "docs/**"
      
permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get install -y pandoc

      - name: Convert Markdown to HTML
        run: |
          pandoc docs/rightclickmate.md \
          -o rightclickmate/help.html \
          --css=../style.css \
          --standalone

      - name: Commit generated HTML
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add rightclickmate/help.html
          git commit -m "Auto build docs"
          git push
